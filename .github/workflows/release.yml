name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  attestations: write
  contents: write
  packages: write
  id-token: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.7.0

      - name: Sign checksums with Cosign keyless
        run: cosign sign-blob --yes --output-signature dist/checksums.txt.sig --output-certificate dist/checksums.txt.pem dist/checksums.txt

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: cojira-${{ github.ref_name || 'manual' }}-sbom.spdx.json

      - name: Attest release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: |
            dist/*
            cojira-${{ github.ref_name }}-sbom.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: cojira-*-sbom.spdx.json

      - name: Upload release signing artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-signing
          path: |
            dist/checksums.txt
            dist/checksums.txt.sig
            dist/checksums.txt.pem

      - name: Attach SBOM and signing artifacts to release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            "cojira-${GITHUB_REF_NAME}-sbom.spdx.json" \
            dist/checksums.txt \
            dist/checksums.txt.sig \
            dist/checksums.txt.pem \
            --clobber
